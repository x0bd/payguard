<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3.6: Level 1 data flow diagram</title>
  <desc id="desc">Level 1 data flow diagram showing internal PayGuard processes for receiving, validating, feature engineering, scoring, alerting, storage, and dashboard reporting.</desc>
  <defs>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#d8d8d8" opacity="0.72" />
    </pattern>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111111" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="1800" height="1050" fill="#f2f3f1" />
  <rect width="1800" height="1050" fill="url(#dot-grid)" opacity="0.95" />

  <g font-family="Inter, Arial, sans-serif">
    <text x="96" y="92" font-size="36" font-weight="850" fill="#101010">PayGuard Level 1 Data Flow Diagram</text>
    <text x="96" y="128" font-size="18" font-weight="500" fill="#666666">Detailed data movement inside the PayGuard fraud detection process</text>

    <g filter="url(#card-shadow)">
      <rect x="84" y="206" width="280" height="116" rx="24" fill="#ffffff" stroke="#e5e5e5" />
      <text x="114" y="252" font-size="21" font-weight="850" fill="#111111">External Entity</text>
      <text x="114" y="282" font-size="15" font-weight="650" fill="#666666">Transaction Source</text>
      <circle cx="342" cy="264" r="7" fill="#111111" />
    </g>

    <g filter="url(#card-shadow)">
      <rect x="84" y="730" width="280" height="116" rx="24" fill="#ffffff" stroke="#e5e5e5" />
      <text x="114" y="776" font-size="21" font-weight="850" fill="#111111">External Entity</text>
      <text x="114" y="806" font-size="15" font-weight="650" fill="#666666">Dashboard User</text>
      <circle cx="342" cy="788" r="7" fill="#111111" />
    </g>

    <g filter="url(#card-shadow)">
      <rect x="474" y="202" width="286" height="118" rx="26" fill="#ffffff" stroke="#e5e5e5" />
      <circle cx="506" cy="236" r="7" fill="#16a34a" />
      <text x="617" y="254" text-anchor="middle" font-size="22" font-weight="850" fill="#111111">1.1 Receive</text>
      <text x="617" y="284" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">Transaction input</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="474" y="416" width="286" height="118" rx="26" fill="#ffffff" stroke="#e5e5e5" />
      <circle cx="506" cy="450" r="7" fill="#16a34a" />
      <text x="617" y="468" text-anchor="middle" font-size="22" font-weight="850" fill="#111111">1.2 Validate</text>
      <text x="617" y="498" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">Check required fields</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="840" y="416" width="300" height="118" rx="26" fill="#ffffff" stroke="#e5e5e5" />
      <circle cx="872" cy="450" r="7" fill="#16a34a" />
      <text x="990" y="468" text-anchor="middle" font-size="22" font-weight="850" fill="#111111">1.3 Build Features</text>
      <text x="990" y="498" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">Amount, time, history, velocity</text>
    </g>

    <g filter="url(#card-shadow)">
