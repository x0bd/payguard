      <rect x="880" y="864" width="226" height="36" rx="18" fill="#f6f6f6" stroke="#e3e3e3" />
      <text x="993" y="887" text-anchor="middle" font-size="20" font-weight="850" fill="#111111">D1 SQLite Database</text>
      <text x="993" y="918" text-anchor="middle" font-size="14" font-weight="650" fill="#666666">Stored transaction history</text>
      <circle cx="993" cy="834" r="7" fill="#111111" />
    </g>

    <g filter="url(#card-shadow)">
      <rect x="1528" y="416" width="220" height="118" rx="26" fill="#ffffff" stroke="#e5e5e5" />
      <text x="1638" y="468" text-anchor="middle" font-size="21" font-weight="850" fill="#111111">Saved Model</text>
      <text x="1638" y="498" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">fraud_model.joblib</text>
      <circle cx="1528" cy="475" r="7" fill="#111111" />
    </g>

    <g fill="none" stroke="#111111" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)">
      <path d="M364 264 C408 264, 430 260, 474 260" />
      <path d="M617 320 C617 356, 617 380, 617 416" />
      <path d="M760 475 C790 475, 810 475, 840 475" />
      <path d="M1140 475 C1170 475, 1188 475, 1218 475" />
      <path d="M1361 534 C1361 574, 1361 604, 1361 644" />
      <path d="M1218 703 C1188 703, 1170 703, 1140 703" />
      <path d="M840 703 C810 703, 790 703, 760 703" />
      <path d="M474 703 C426 734, 392 768, 364 788" />
      <path d="M990 762 C990 790, 992 806, 993 834" />
      <path d="M1528 475 C1518 475, 1514 475, 1504 475" />
    </g>

    <g fill="none" stroke="#111111" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)" opacity="0.92">
      <path d="M993 834 C993 794, 993 790, 993 762" />
      <path d="M1504 504 C1514 504, 1518 504, 1528 504" />
    </g>

    <g font-size="13" font-weight="800" fill="#111111">
      <rect x="380" y="230" width="104" height="32" rx="16" fill="#ffffff" stroke="#e9e9e9" />
      <text x="432" y="251" text-anchor="middle">Raw data</text>

      <rect x="636" y="360" width="126" height="32" rx="16" fill="#ffffff" stroke="#e9e9e9" />
      <text x="699" y="381" text-anchor="middle">Valid input</text>

      <rect x="770" y="440" width="72" height="32" rx="16" fill="#ffffff" stroke="#e9e9e9" />
      <text x="806" y="461" text-anchor="middle">Fields</text>

      <rect x="1152" y="440" width="82" height="32" rx="16" fill="#ffffff" stroke="#e9e9e9" />
      <text x="1193" y="461" text-anchor="middle">Features</text>

      <rect x="1392" y="574" width="100" height="32" rx="16" fill="#ffffff" stroke="#e9e9e9" />
      <text x="1442" y="595" text-anchor="middle">Risk score</text>

      <rect x="1146" y="668" width="74" height="32" rx="16" fill="#ffffff" stroke="#e9e9e9" />
      <text x="1183" y="689" text-anchor="middle">Alert</text>

      <rect x="764" y="668" width="78" height="32" rx="16" fill="#ffffff" stroke="#e9e9e9" />
      <text x="803" y="689" text-anchor="middle">Records</text>

      <rect x="356" y="742" width="126" height="32" rx="16" fill="#ffffff" stroke="#e9e9e9" />
      <text x="419" y="763" text-anchor="middle">Dashboard data</text>
