      <circle cx="1250" cy="450" r="7" fill="#16a34a" />
      <text x="1361" y="468" text-anchor="middle" font-size="22" font-weight="850" fill="#111111">1.4 Score Risk</text>
      <text x="1361" y="498" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">Model prediction</text>
    </g>

    <g filter="url(#card-shadow)">
