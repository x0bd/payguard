      <text x="1361" y="726" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">Risk level and reason</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="840" y="644" width="300" height="118" rx="26" fill="#ffffff" stroke="#e5e5e5" />
      <circle cx="872" cy="678" r="7" fill="#16a34a" />
      <text x="990" y="696" text-anchor="middle" font-size="22" font-weight="850" fill="#111111">1.6 Store Records</text>
      <text x="990" y="726" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">Transactions and alerts</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="474" y="644" width="286" height="118" rx="26" fill="#ffffff" stroke="#e5e5e5" />
      <circle cx="506" cy="678" r="7" fill="#16a34a" />
      <text x="617" y="696" text-anchor="middle" font-size="22" font-weight="850" fill="#111111">1.7 Serve Dashboard</text>
      <text x="617" y="726" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">Metrics, alerts, accounts</text>
    </g>

    <g filter="url(#card-shadow)">
