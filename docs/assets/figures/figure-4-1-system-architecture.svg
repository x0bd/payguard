<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1000" viewBox="0 0 1700 1000" role="img" aria-labelledby="title desc">
  <title id="title">Figure 4.1: System architecture diagram</title>
  <desc id="desc">Layered PayGuard architecture showing the React frontend, Flask API, SQLite database, machine learning layer and synthetic data generator.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#111111"/>
    </marker>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.4" fill="#d9ddd7"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f5f6f3; }
      .panel { fill: #ffffff; stroke: #e3e5e0; stroke-width: 2; filter: url(#shadow); }
      .card { fill: #ffffff; stroke: #dfe3dc; stroke-width: 2; }
      .soft { fill: #f7f8f5; stroke: #e4e6e1; stroke-width: 2; }
      .ink { fill: #111111; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #6f756c; font-family: Inter, Arial, sans-serif; }
      .mono { fill: #111111; font-family: "JetBrains Mono", "Courier New", monospace; }
      .green { fill: #16a34a; }
      .line { stroke: #111111; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" width="1700" height="1000"/>
  <rect width="1700" height="1000" fill="url(#dots)" opacity="0.85"/>
  <text x="120" y="96" class="ink" font-size="34" font-weight="800">PayGuard System Architecture</text>
  <text x="120" y="132" class="muted" font-size="18">Layered prototype design for fraud monitoring and alert review</text>

  <rect x="120" y="190" width="1460" height="690" rx="34" class="panel"/>

  <rect x="190" y="285" width="310" height="180" rx="28" class="card"/>
  <text x="230" y="337" class="ink" font-size="24" font-weight="800">Presentation Layer</text>
  <text x="230" y="374" class="muted" font-size="16">React, TypeScript, Vite</text>
  <text x="230" y="405" class="muted" font-size="16">Tailwind CSS and shadcn/ui</text>
  <rect x="230" y="424" width="115" height="34" rx="12" fill="#111111"/>
  <text x="253" y="446" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Dashboard</text>

  <rect x="690" y="285" width="320" height="180" rx="28" class="card"/>
  <text x="730" y="337" class="ink" font-size="24" font-weight="800">API Layer</text>
  <text x="730" y="374" class="muted" font-size="16">Python Flask backend</text>
  <text x="730" y="405" class="muted" font-size="16">Validation, routing, JSON</text>
  <rect x="730" y="424" width="142" height="34" rx="12" fill="#111111"/>
  <text x="755" y="446" fill="#ffffff" font-family="JetBrains Mono, Courier New, monospace" font-size="13">/api/*</text>

  <rect x="1190" y="285" width="310" height="180" rx="28" class="card"/>
  <text x="1230" y="337" class="ink" font-size="24" font-weight="800">Data Layer</text>
  <text x="1230" y="374" class="muted" font-size="16">SQLite database</text>
  <text x="1230" y="405" class="muted" font-size="16">Transactions, alerts, runs</text>
  <rect x="1230" y="424" width="132" height="34" rx="12" fill="#111111"/>
  <text x="1255" y="446" fill="#ffffff" font-family="JetBrains Mono, Courier New, monospace" font-size="13">payguard.db</text>

  <rect x="440" y="610" width="330" height="160" rx="28" class="soft"/>
  <text x="480" y="662" class="ink" font-size="24" font-weight="800">ML Layer</text>
  <text x="480" y="699" class="muted" font-size="16">pandas, NumPy, scikit-learn</text>
  <text x="480" y="730" class="muted" font-size="16">Feature building and scoring</text>

  <rect x="930" y="610" width="330" height="160" rx="28" class="soft"/>
  <text x="970" y="662" class="ink" font-size="24" font-weight="800">Data Generation</text>
  <text x="970" y="699" class="muted" font-size="16">Synthetic transactions</text>
  <text x="970" y="730" class="muted" font-size="16">Fraud patterns for training</text>

  <path d="M500 375 H680" class="line"/>
  <path d="M1010 375 H1180" class="line"/>
  <path d="M850 465 V590" class="line"/>
  <path d="M1095 610 V520 C1095 490 1150 490 1190 465" class="line"/>
  <path d="M930 690 H790" class="line"/>
  <circle cx="850" cy="535" r="9" class="green"/>
  <text x="805" y="538" class="mono" font-size="13">score</text>
  <circle cx="1115" cy="512" r="9" class="green"/>
  <text x="1130" y="516" class="mono" font-size="13">seed</text>
</svg>
