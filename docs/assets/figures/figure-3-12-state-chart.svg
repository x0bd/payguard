<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3.12: State chart diagram</title>
  <desc id="desc">State chart diagram showing the alert lifecycle in PayGuard from creation to open, review, resolved, closed, and reopened states.</desc>
  <defs>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#d8d8d8" opacity="0.72" />
    </pattern>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111111" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#f2f3f1" />
  <rect width="1600" height="900" fill="url(#dot-grid)" opacity="0.95" />

  <g font-family="Inter, Arial, sans-serif">
    <text x="96" y="92" font-size="34" font-weight="850" fill="#101010">PayGuard Alert State Chart</text>
    <text x="96" y="126" font-size="18" font-weight="500" fill="#666666">Lifecycle of an alert after a transaction has been scored</text>

    <circle cx="152" cy="450" r="22" fill="#111111" />

    <g filter="url(#card-shadow)">
      <rect x="246" y="390" width="250" height="120" rx="60" fill="#ffffff" stroke="#dedede" />
      <circle cx="286" cy="450" r="7" fill="#16a34a" />
      <text x="371" y="443" text-anchor="middle" font-size="23" font-weight="850" fill="#111111">Created</text>
      <text x="371" y="474" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">score result saved</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="610" y="390" width="250" height="120" rx="60" fill="#ffffff" stroke="#dedede" />
      <circle cx="650" cy="450" r="7" fill="#16a34a" />
      <text x="735" y="443" text-anchor="middle" font-size="23" font-weight="850" fill="#111111">Open</text>
      <text x="735" y="474" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">requires review</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="974" y="390" width="250" height="120" rx="60" fill="#ffffff" stroke="#dedede" />
      <circle cx="1014" cy="450" r="7" fill="#16a34a" />
      <text x="1099" y="443" text-anchor="middle" font-size="23" font-weight="850" fill="#111111">Under Review</text>
      <text x="1099" y="474" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">analyst checks alert</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="1148" y="648" width="250" height="120" rx="60" fill="#ffffff" stroke="#dedede" />
      <circle cx="1188" cy="708" r="7" fill="#16a34a" />
      <text x="1273" y="701" text-anchor="middle" font-size="23" font-weight="850" fill="#111111">Resolved</text>
      <text x="1273" y="732" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">investigation done</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="1148" y="134" width="250" height="120" rx="60" fill="#ffffff" stroke="#dedede" />
      <circle cx="1188" cy="194" r="7" fill="#16a34a" />
      <text x="1273" y="187" text-anchor="middle" font-size="23" font-weight="850" fill="#111111">Closed</text>
      <text x="1273" y="218" text-anchor="middle" font-size="15" font-weight="650" fill="#666666">dismissed or low risk</text>
    </g>

    <circle cx="1464" cy="708" r="26" fill="none" stroke="#111111" stroke-width="6" />
    <circle cx="1464" cy="708" r="14" fill="#111111" />

    <g fill="none" stroke="#111111" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)">
      <path d="M174 450 H246" />
      <path d="M496 450 H610" />
      <path d="M860 450 H974" />
      <path d="M1154 390 C1190 344, 1240 304, 1260 254" />
      <path d="M1154 510 C1190 556, 1240 604, 1260 648" />
      <path d="M1398 708 H1438" />
      <path d="M1148 194 C970 120, 740 160, 735 390" />
      <path d="M1148 708 C930 812, 704 746, 735 510" />
    </g>

    <g font-size="14" font-weight="850" fill="#111111">
      <rect x="514" y="414" width="78" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="553" y="436" text-anchor="middle">risk high</text>

      <rect x="884" y="414" width="72" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="920" y="436" text-anchor="middle">review</text>

      <rect x="1220" y="316" width="116" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="1278" y="338" text-anchor="middle">dismiss alert</text>

      <rect x="1220" y="558" width="118" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="1279" y="580" text-anchor="middle">resolve alert</text>

      <rect x="876" y="150" width="118" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="935" y="172" text-anchor="middle">reopen</text>

      <rect x="838" y="760" width="148" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="912" y="782" text-anchor="middle">needs more review</text>
    </g>
  </g>
</svg>
