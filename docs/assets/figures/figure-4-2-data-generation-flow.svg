<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1000" viewBox="0 0 1700 1000" role="img" aria-labelledby="title desc">
  <title id="title">Figure 4.2: Data generation flow diagram</title>
  <desc id="desc">Synthetic data generation flow from configuration to account profiles, normal transactions, fraud injection, labelling and CSV output.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#111111"/>
    </marker>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.4" fill="#d9ddd7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.12"/></filter>
    <style>
      .bg { fill: #f5f6f3; }
      .panel { fill: #ffffff; stroke: #e3e5e0; stroke-width: 2; filter: url(#shadow); }
      .card { fill: #ffffff; stroke: #dfe3dc; stroke-width: 2; }
      .dark { fill: #111111; }
      .ink { fill: #111111; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #6f756c; font-family: Inter, Arial, sans-serif; }
      .mono { fill: #111111; font-family: "JetBrains Mono", "Courier New", monospace; }
      .green { fill: #16a34a; }
      .line { stroke: #111111; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect class="bg" width="1700" height="1000"/><rect width="1700" height="1000" fill="url(#dots)" opacity="0.85"/>
  <text x="120" y="96" class="ink" font-size="34" font-weight="800">Synthetic Data Generation Flow</text>
  <text x="120" y="132" class="muted" font-size="18">How PayGuard creates safe prototype transaction data without real customer records</text>
  <rect x="120" y="190" width="1460" height="690" rx="34" class="panel"/>

  <g>
    <rect x="180" y="410" width="220" height="140" rx="26" class="card"/>
    <text x="220" y="462" class="ink" font-size="21" font-weight="800">Configuration</text>
    <text x="220" y="496" class="muted" font-size="15">Accounts, days</text>
    <text x="220" y="523" class="muted" font-size="15">seed, output path</text>
  </g>
  <g>
    <rect x="480" y="300" width="250" height="140" rx="26" class="card"/>
    <text x="520" y="352" class="ink" font-size="21" font-weight="800">Account Profiles</text>
    <text x="520" y="386" class="muted" font-size="15">Location, device</text>
    <text x="520" y="413" class="muted" font-size="15">typical amount</text>
  </g>
  <g>
    <rect x="480" y="520" width="250" height="140" rx="26" class="card"/>
    <text x="520" y="572" class="ink" font-size="21" font-weight="800">Normal Activity</text>
    <text x="520" y="606" class="muted" font-size="15">Transaction type</text>
    <text x="520" y="633" class="muted" font-size="15">amount and time</text>
  </g>
  <g>
    <rect x="830" y="410" width="270" height="140" rx="26" class="card"/>
    <text x="870" y="462" class="ink" font-size="21" font-weight="800">Fraud Injection</text>
    <text x="870" y="496" class="muted" font-size="15">Amount spike</text>
    <text x="870" y="523" class="muted" font-size="15">device or rapid burst</text>
  </g>
  <g>
    <rect x="1180" y="410" width="260" height="140" rx="26" class="card"/>
    <text x="1220" y="462" class="ink" font-size="21" font-weight="800">Label and Save</text>
    <text x="1220" y="496" class="muted" font-size="15">is_fraud, pattern</text>
    <text x="1220" y="523" class="muted" font-size="15">CSV dataset</text>
  </g>
  <path d="M400 480 C435 480 445 370 470 370" class="line"/>
  <path d="M400 480 C435 480 445 590 470 590" class="line"/>
  <path d="M730 370 C790 370 790 480 820 480" class="line"/>
  <path d="M730 590 C790 590 790 480 820 480" class="line"/>
  <path d="M1100 480 H1170" class="line"/>
  <circle cx="965" cy="480" r="11" class="green"/>
  <text x="740" y="738" class="mono" font-size="16">Output: synthetic_transactions.csv</text>
  <rect x="710" y="705" width="310" height="52" rx="18" fill="#f7f8f5" stroke="#e4e6e1" stroke-width="2"/>
</svg>
