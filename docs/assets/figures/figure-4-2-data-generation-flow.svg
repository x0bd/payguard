<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1000" viewBox="0 0 1700 1000" role="img" aria-labelledby="title desc">
  <title id="title">Figure 4.2: Data generation flow diagram</title>
  <desc id="desc">A transparent Microsoft Word style flow diagram showing how synthetic PayGuard transaction data is generated and saved.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#111111"/>
    </marker>
    <style>
      .title { fill: #111111; font-family: Calibri, Arial, sans-serif; font-size: 40px; font-weight: 700; }
      .subtitle { fill: #333333; font-family: Calibri, Arial, sans-serif; font-size: 22px; }
      .startEnd { fill: #f2f2f2; stroke: #111111; stroke-width: 2; }
      .process { fill: #ffffff; stroke: #111111; stroke-width: 2; }
      .decision { fill: #e6e6e6; stroke: #111111; stroke-width: 2; }
      .output { fill: #f7f7f7; stroke: #111111; stroke-width: 2; }
      .note { fill: #ffffff; stroke: #111111; stroke-width: 2; stroke-dasharray: 8 6; }
      .textLight { fill: #111111; font-family: Calibri, Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .textDark { fill: #111111; font-family: Calibri, Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .small { fill: #111111; font-family: Calibri, Arial, sans-serif; font-size: 17px; font-weight: 600; }
      .line { stroke: #111111; stroke-width: 2.4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <text x="90" y="86" class="title">Synthetic Data Generation Flow Diagram</text>
  <text x="90" y="124" class="subtitle">How PayGuard creates safe prototype transaction records without real customer data</text>

  <circle cx="180" cy="465" r="42" class="startEnd"/>
  <text x="180" y="473" class="textLight" text-anchor="middle">Start</text>

  <rect x="310" y="420" width="275" height="90" rx="9" class="process"/>
  <text x="447" y="455" class="textLight" text-anchor="middle">Set generator</text>
  <text x="447" y="482" class="textLight" text-anchor="middle">parameters</text>

  <rect x="700" y="265" width="300" height="90" rx="9" class="process"/>
  <text x="850" y="300" class="textLight" text-anchor="middle">Create account</text>
  <text x="850" y="327" class="textLight" text-anchor="middle">profiles</text>

  <rect x="700" y="575" width="300" height="90" rx="9" class="process"/>
  <text x="850" y="610" class="textLight" text-anchor="middle">Generate normal</text>
  <text x="850" y="637" class="textLight" text-anchor="middle">transactions</text>

  <polygon points="1175,365 1350,465 1175,565 1000,465" class="decision"/>
  <text x="1175" y="458" class="textDark" text-anchor="middle">Inject fraud</text>
  <text x="1175" y="485" class="textDark" text-anchor="middle">pattern?</text>

  <rect x="1000" y="690" width="350" height="86" rx="9" class="process"/>
  <text x="1175" y="724" class="textLight" text-anchor="middle">Apply fraud pattern</text>
  <text x="1175" y="751" class="textLight" text-anchor="middle">amount, device, or burst</text>

  <path d="M1390 420 L1590 420 L1565 510 L1365 510 Z" class="output"/>
  <text x="1478" y="455" class="textLight" text-anchor="middle">Label transaction</text>
  <text x="1478" y="482" class="textLight" text-anchor="middle">and save CSV</text>

  <circle cx="1478" cy="645" r="42" class="startEnd"/>
  <text x="1478" y="653" class="textLight" text-anchor="middle">End</text>

  <rect x="480" y="760" width="400" height="78" rx="8" class="note"/>
  <text x="680" y="792" class="textDark" text-anchor="middle">Synthetic data rule</text>
  <text x="680" y="820" class="small" text-anchor="middle">No real mobile money customer records are used.</text>

  <path d="M222 465 H300" class="line"/>
  <path d="M585 465 C650 430 690 355 700 315" class="line"/>
  <path d="M585 465 C650 505 690 585 700 620" class="line"/>
  <path d="M1000 310 C1060 330 1105 380 1140 425" class="line"/>
  <path d="M1000 620 C1060 590 1105 540 1140 505" class="line"/>

  <path d="M1175 565 V680" class="line"/>
  <text x="1195" y="625" class="small">Yes</text>
  <path d="M1350 465 H1380" class="line"/>
  <text x="1360" y="445" class="small">No</text>
  <path d="M1350 733 C1420 725 1458 610 1472 515" class="line"/>
  <path d="M1478 510 V593" class="line"/>
</svg>
