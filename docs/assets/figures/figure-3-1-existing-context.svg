<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3.1: Existing system context diagram</title>
  <desc id="desc">Context diagram showing the current manual transaction confirmation process before PayGuard is introduced.</desc>
  <defs>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#d8d8d8" opacity="0.72" />
    </pattern>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111111" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#f2f3f1" />
  <rect width="1600" height="900" fill="url(#dot-grid)" opacity="0.95" />

  <g font-family="Inter, Arial, sans-serif">
    <text x="96" y="92" font-size="34" font-weight="800" fill="#101010">Existing System Context Diagram</text>
    <text x="96" y="126" font-size="18" font-weight="500" fill="#666666">Manual mobile money transaction confirmation before PayGuard</text>

    <g filter="url(#card-shadow)">
      <rect x="588" y="318" width="424" height="184" rx="28" fill="#ffffff" stroke="#e5e5e5" />
      <text x="800" y="388" text-anchor="middle" font-size="24" font-weight="800" fill="#111111">Current Payment</text>
      <text x="800" y="420" text-anchor="middle" font-size="24" font-weight="800" fill="#111111">Monitoring Process</text>
      <text x="800" y="454" text-anchor="middle" font-size="15" font-weight="600" fill="#666666">Manual checking, reconciliation, and reporting</text>
      <circle cx="616" cy="346" r="6" fill="#16a34a" />
    </g>

    <g filter="url(#card-shadow)">
      <rect x="96" y="210" width="318" height="128" rx="24" fill="#ffffff" stroke="#e5e5e5" />
      <text x="126" y="257" font-size="22" font-weight="800" fill="#111111">Student / Guardian</text>
      <text x="126" y="290" font-size="15" font-weight="600" fill="#666666">Makes payment and sends proof</text>
      <circle cx="392" cy="274" r="7" fill="#111111" />
    </g>

    <g filter="url(#card-shadow)">
      <rect x="96" y="562" width="318" height="128" rx="24" fill="#ffffff" stroke="#e5e5e5" />
      <text x="126" y="609" font-size="22" font-weight="800" fill="#111111">Mobile Money Platform</text>
      <text x="126" y="642" font-size="15" font-weight="600" fill="#666666">Processes payment transaction</text>
      <circle cx="392" cy="626" r="7" fill="#111111" />
    </g>

    <g filter="url(#card-shadow)">
      <rect x="1186" y="210" width="318" height="128" rx="24" fill="#ffffff" stroke="#e5e5e5" />
      <text x="1216" y="257" font-size="22" font-weight="800" fill="#111111">Finance Officer</text>
      <text x="1216" y="290" font-size="15" font-weight="600" fill="#666666">Checks receipts and records</text>
      <circle cx="1208" cy="274" r="7" fill="#111111" />
    </g>

    <g filter="url(#card-shadow)">
      <rect x="1186" y="562" width="318" height="128" rx="24" fill="#ffffff" stroke="#e5e5e5" />
      <text x="1216" y="609" font-size="22" font-weight="800" fill="#111111">Institutional Records</text>
      <text x="1216" y="642" font-size="15" font-weight="600" fill="#666666">Stores payment status and reports</text>
      <circle cx="1208" cy="626" r="7" fill="#111111" />
    </g>

    <g filter="url(#card-shadow)">
      <rect x="641" y="650" width="318" height="116" rx="24" fill="#ffffff" stroke="#e5e5e5" />
      <text x="800" y="696" text-anchor="middle" font-size="22" font-weight="800" fill="#111111">Administrator</text>
      <text x="800" y="728" text-anchor="middle" font-size="15" font-weight="600" fill="#666666">Receives summaries and exceptions</text>
      <circle cx="800" cy="650" r="7" fill="#111111" />
    </g>

    <g fill="none" stroke="#111111" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)">
      <path d="M414 274 C505 274, 520 352, 588 374" />
      <path d="M414 626 C505 626, 522 476, 588 444" />
      <path d="M1012 374 C1082 352, 1094 274, 1186 274" />
      <path d="M1012 444 C1080 476, 1098 626, 1186 626" />
      <path d="M800 502 C800 558, 800 594, 800 650" />
    </g>

    <g font-size="14" font-weight="800" fill="#111111">
      <rect x="448" y="250" width="160" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="528" y="272" text-anchor="middle">Payment proof</text>

      <rect x="436" y="592" width="178" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="525" y="614" text-anchor="middle">Transaction record</text>

      <rect x="1000" y="250" width="172" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="1086" y="272" text-anchor="middle">Manual review</text>

      <rect x="1004" y="592" width="168" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="1088" y="614" text-anchor="middle">Updated status</text>

      <rect x="704" y="552" width="192" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="800" y="574" text-anchor="middle">Summary reports</text>
    </g>
  </g>
</svg>
