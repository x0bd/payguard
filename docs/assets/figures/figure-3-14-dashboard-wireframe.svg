<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1000" viewBox="0 0 1700 1000" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3.14: Dashboard wireframe</title>
  <desc id="desc">A clean PayGuard dashboard wireframe showing navigation, summary cards, a risk trend chart, recent alerts and transaction activity.</desc>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.4" fill="#d9ddd7"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f5f6f3; }
      .panel { fill: #ffffff; stroke: #e3e5e0; stroke-width: 2; filter: url(#shadow); }
      .soft { fill: #f7f8f5; stroke: #e4e6e1; stroke-width: 2; }
      .ink { fill: #111111; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #6f756c; font-family: Inter, Arial, sans-serif; }
      .mono { fill: #111111; font-family: "JetBrains Mono", "Courier New", monospace; }
      .green { fill: #16a34a; }
      .green-stroke { stroke: #16a34a; }
      .line { stroke: #111111; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #d9ded6; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1700" height="1000"/>
  <rect width="1700" height="1000" fill="url(#dots)" opacity="0.85"/>

  <text x="120" y="96" class="ink" font-size="34" font-weight="800">PayGuard Dashboard Wireframe</text>
  <text x="120" y="132" class="muted" font-size="18">Main monitoring screen for metrics, fraud trends, alerts and recent transactions</text>

  <rect x="120" y="180" width="1460" height="720" rx="34" class="panel"/>

  <rect x="150" y="210" width="230" height="660" rx="26" fill="#111111"/>
  <text x="184" y="265" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">PayGuard</text>
  <circle cx="337" cy="255" r="10" class="green"/>
  <rect x="180" y="318" width="170" height="48" rx="16" fill="#ffffff"/>
  <text x="207" y="349" class="ink" font-size="16" font-weight="800">Dashboard</text>
  <text x="207" y="413" fill="#b9beb6" font-family="Inter, Arial, sans-serif" font-size="16">Alerts</text>
  <text x="207" y="465" fill="#b9beb6" font-family="Inter, Arial, sans-serif" font-size="16">Transactions</text>
  <text x="207" y="517" fill="#b9beb6" font-family="Inter, Arial, sans-serif" font-size="16">Accounts</text>
  <text x="207" y="569" fill="#b9beb6" font-family="Inter, Arial, sans-serif" font-size="16">Model metrics</text>
  <rect x="178" y="760" width="174" height="70" rx="20" fill="#1d1d1d" stroke="#333333"/>
  <text x="202" y="790" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">System status</text>
  <text x="202" y="815" fill="#86efac" font-family="JetBrains Mono, Courier New, monospace" font-size="13">API online</text>

  <text x="430" y="262" class="ink" font-size="30" font-weight="800">Fraud monitoring overview</text>
  <text x="430" y="296" class="muted" font-size="16">Daily snapshot of transaction risk across the mobile money environment.</text>

  <rect x="1290" y="226" width="230" height="54" rx="18" fill="#111111"/>
  <text x="1332" y="260" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Run new check</text>
  <circle cx="1494" cy="253" r="8" class="green"/>

  <g>
    <rect x="430" y="335" width="250" height="126" rx="24" class="soft"/>
    <text x="458" y="375" class="muted" font-size="15">Total transactions</text>
    <text x="458" y="422" class="mono" font-size="34" font-weight="800">12,480</text>
    <text x="458" y="443" class="muted" font-size="13">Processed this cycle</text>
  </g>
  <g>
    <rect x="710" y="335" width="250" height="126" rx="24" class="soft"/>
    <text x="738" y="375" class="muted" font-size="15">High-risk alerts</text>
    <text x="738" y="422" class="mono" font-size="34" font-weight="800">38</text>
    <text x="738" y="443" class="muted" font-size="13">Requires review</text>
  </g>
  <g>
    <rect x="990" y="335" width="250" height="126" rx="24" class="soft"/>
    <text x="1018" y="375" class="muted" font-size="15">Average risk</text>
    <text x="1018" y="422" class="mono" font-size="34" font-weight="800">0.42</text>
    <text x="1018" y="443" class="muted" font-size="13">Model score</text>
  </g>
  <g>
    <rect x="1270" y="335" width="250" height="126" rx="24" class="soft"/>
    <text x="1298" y="375" class="muted" font-size="15">Model F1 score</text>
    <text x="1298" y="422" class="mono" font-size="34" font-weight="800">0.91</text>
    <text x="1298" y="443" class="muted" font-size="13">Latest evaluation</text>
  </g>

  <rect x="430" y="500" width="650" height="310" rx="28" class="soft"/>
  <text x="465" y="548" class="ink" font-size="20" font-weight="800">Risk trend</text>
  <text x="465" y="574" class="muted" font-size="14">Fraud probability movement over recent batches</text>
  <line x1="480" y1="744" x2="1010" y2="744" class="thin"/>
  <line x1="480" y1="670" x2="1010" y2="670" class="thin"/>
  <line x1="480" y1="596" x2="1010" y2="596" class="thin"/>
  <path d="M500 720 C560 690, 610 696, 660 646 C710 596, 758 632, 810 590 C870 540, 932 585, 1000 535" stroke="#111111" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M500 760 C570 746, 622 752, 690 716 C755 683, 815 710, 875 660 C920 624, 963 642, 1000 610" class="green-stroke" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="1000" cy="535" r="9" fill="#111111"/>
  <circle cx="1000" cy="610" r="9" class="green"/>

  <rect x="1120" y="500" width="400" height="310" rx="28" class="soft"/>
  <text x="1155" y="548" class="ink" font-size="20" font-weight="800">Recent alerts</text>
  <text x="1155" y="574" class="muted" font-size="14">Top cases awaiting finance review</text>
  <rect x="1155" y="610" width="330" height="52" rx="16" fill="#ffffff" stroke="#e5e7e1"/>
  <circle cx="1183" cy="636" r="8" class="green"/>
  <text x="1205" y="631" class="ink" font-size="14" font-weight="800">TX-09218</text>
  <text x="1205" y="650" class="muted" font-size="12">Large transfer, new receiver</text>
  <text x="1434" y="643" class="mono" font-size="13">0.94</text>
  <rect x="1155" y="680" width="330" height="52" rx="16" fill="#ffffff" stroke="#e5e7e1"/>
  <circle cx="1183" cy="706" r="8" fill="#111111"/>
  <text x="1205" y="701" class="ink" font-size="14" font-weight="800">TX-09177</text>
  <text x="1205" y="720" class="muted" font-size="12">Velocity threshold exceeded</text>
  <text x="1434" y="713" class="mono" font-size="13">0.88</text>
  <rect x="1155" y="750" width="330" height="52" rx="16" fill="#ffffff" stroke="#e5e7e1"/>
  <circle cx="1183" cy="776" r="8" fill="#9ca3af"/>
  <text x="1205" y="771" class="ink" font-size="14" font-weight="800">TX-09102</text>
  <text x="1205" y="790" class="muted" font-size="12">Unusual account pattern</text>
  <text x="1434" y="783" class="mono" font-size="13">0.82</text>

  <rect x="430" y="840" width="1090" height="1" fill="#e3e5e0"/>
  <text x="430" y="868" class="muted" font-size="13">Wireframe elements: navigation, KPI cards, risk chart, recent alert list and action entry point.</text>
</svg>
