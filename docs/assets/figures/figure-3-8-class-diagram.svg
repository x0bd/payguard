<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1050" viewBox="0 0 1700 1050" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3.8: Class diagram</title>
  <desc id="desc">A Microsoft Word style class diagram showing the main PayGuard user roles, domain classes and relationships.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <style>
      .title { fill: #111111; font-family: Calibri, Arial, sans-serif; font-size: 40px; font-weight: 700; }
      .subtitle { fill: #333333; font-family: Calibri, Arial, sans-serif; font-size: 22px; }
      .classBox { fill: #ffffff; stroke: #111111; stroke-width: 2.2; }
      .roleHead { fill: #f2f2f2; stroke: none; }
      .dataHead { fill: #eaf7ee; stroke: none; }
      .modelHead { fill: #eef2ff; stroke: none; }
      .name { fill: #111111; font-family: Calibri, Arial, sans-serif; font-size: 21px; font-weight: 700; }
      .field { fill: #111111; font-family: Calibri, Arial, sans-serif; font-size: 16px; font-weight: 600; }
      .small { fill: #111111; font-family: Calibri, Arial, sans-serif; font-size: 15px; font-weight: 600; }
      .sep { stroke: #d0d0d0; stroke-width: 1.4; }
      .rel { stroke: #111111; stroke-width: 2.2; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .assoc { stroke: #111111; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <text x="90" y="86" class="title">PayGuard Class Diagram</text>
  <text x="90" y="124" class="subtitle">Main user roles and system classes used to monitor and review fraudulent transactions</text>

  <g id="finance-officer">
    <rect x="90" y="190" width="310" height="190" rx="8" class="classBox"/>
    <rect x="90" y="190" width="310" height="54" rx="8" class="roleHead"/>
    <text x="245" y="225" class="name" text-anchor="middle">FinanceOfficer</text>
    <line x1="90" y1="288" x2="400" y2="288" class="sep"/>
    <text x="118" y="274" class="field">+ officer_id</text>
    <text x="118" y="318" class="field">+ reviewTransaction()</text>
    <text x="118" y="346" class="field">+ viewDashboard()</text>
  </g>

  <g id="fraud-analyst">
    <rect x="495" y="190" width="310" height="190" rx="8" class="classBox"/>
    <rect x="495" y="190" width="310" height="54" rx="8" class="roleHead"/>
    <text x="650" y="225" class="name" text-anchor="middle">FraudAnalyst</text>
    <line x1="495" y1="288" x2="805" y2="288" class="sep"/>
    <text x="523" y="274" class="field">+ analyst_id</text>
    <text x="523" y="318" class="field">+ investigateAlert()</text>
    <text x="523" y="346" class="field">+ viewAccountProfile()</text>
  </g>

  <g id="administrator">
    <rect x="900" y="190" width="310" height="190" rx="8" class="classBox"/>
    <rect x="900" y="190" width="310" height="54" rx="8" class="roleHead"/>
    <text x="1055" y="225" class="name" text-anchor="middle">Administrator</text>
    <line x1="900" y1="288" x2="1210" y2="288" class="sep"/>
    <text x="928" y="274" class="field">+ admin_id</text>
    <text x="928" y="318" class="field">+ updateAlertStatus()</text>
    <text x="928" y="346" class="field">+ viewModelMetrics()</text>
  </g>

  <g id="researcher-developer">
    <rect x="1305" y="190" width="310" height="190" rx="8" class="classBox"/>
    <rect x="1305" y="190" width="310" height="54" rx="8" class="roleHead"/>
    <text x="1460" y="225" class="name" text-anchor="middle">ResearcherDeveloper</text>
    <line x1="1305" y1="288" x2="1615" y2="288" class="sep"/>
    <text x="1333" y="274" class="field">+ developer_id</text>
    <text x="1333" y="318" class="field">+ generateData()</text>
    <text x="1333" y="346" class="field">+ trainModel()</text>
  </g>

  <g id="transaction">
    <rect x="210" y="645" width="350" height="220" rx="8" class="classBox"/>
    <rect x="210" y="645" width="350" height="54" rx="8" class="dataHead"/>
    <text x="385" y="680" class="name" text-anchor="middle">Transaction</text>
    <line x1="210" y1="760" x2="560" y2="760" class="sep"/>
    <text x="238" y="728" class="field">+ id, account_id</text>
    <text x="238" y="754" class="field">+ amount, transaction_type</text>
    <text x="238" y="790" class="field">+ fraud_score</text>
    <text x="238" y="818" class="field">+ is_fraud</text>
    <text x="238" y="846" class="field">+ created_at</text>
  </g>

  <g id="alert">
    <rect x="675" y="645" width="350" height="220" rx="8" class="classBox"/>
    <rect x="675" y="645" width="350" height="54" rx="8" class="dataHead"/>
    <text x="850" y="680" class="name" text-anchor="middle">Alert</text>
    <line x1="675" y1="760" x2="1025" y2="760" class="sep"/>
    <text x="703" y="728" class="field">+ id, transaction_id</text>
    <text x="703" y="754" class="field">+ risk_score, alert_type</text>
    <text x="703" y="790" class="field">+ reason</text>
    <text x="703" y="818" class="field">+ status</text>
    <text x="703" y="846" class="field">+ resolved_at</text>
  </g>

  <g id="model-run">
    <rect x="1140" y="645" width="350" height="220" rx="8" class="classBox"/>
    <rect x="1140" y="645" width="350" height="54" rx="8" class="modelHead"/>
    <text x="1315" y="680" class="name" text-anchor="middle">ModelRun</text>
    <line x1="1140" y1="760" x2="1490" y2="760" class="sep"/>
    <text x="1168" y="728" class="field">+ id, model_name</text>
    <text x="1168" y="754" class="field">+ model_version</text>
    <text x="1168" y="790" class="field">+ metrics_json</text>
    <text x="1168" y="818" class="field">+ created_at</text>
    <text x="1168" y="846" class="field">+ notes</text>
  </g>

  <path d="M245 380 V510 H315 V645" class="rel"/>
  <text x="258" y="500" class="small">reviews</text>

  <path d="M650 380 V510 H760 V645" class="rel"/>
  <text x="670" y="500" class="small">investigates</text>

  <path d="M1055 380 V500 H940 V645" class="rel"/>
  <text x="930" y="490" class="small">updates status</text>

  <path d="M1460 380 V510 H1405 V645" class="rel"/>
  <text x="1380" y="500" class="small">trains</text>

  <path d="M560 755 H675" class="rel"/>
  <text x="592" y="734" class="small">creates</text>
  <text x="577" y="783" class="small">1</text>
  <text x="642" y="783" class="small">0..*</text>

  <path d="M1140 755 H1025" class="rel"/>
  <text x="1052" y="734" class="small">scores</text>

  <path d="M1055 380 V440 H1215 V645" class="rel"/>
  <text x="1132" y="430" class="small">views metrics</text>
</svg>
