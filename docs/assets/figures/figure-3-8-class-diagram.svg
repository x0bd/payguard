<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3.8: Class diagram</title>
  <desc id="desc">Class diagram showing the main PayGuard modules and their responsibilities.</desc>
  <defs>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#d8d8d8" opacity="0.72" />
    </pattern>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111111" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="1800" height="1100" fill="#f2f3f1" />
  <rect width="1800" height="1100" fill="url(#dot-grid)" opacity="0.95" />

  <g font-family="Inter, Arial, sans-serif">
    <text x="96" y="92" font-size="36" font-weight="850" fill="#101010">PayGuard Class Diagram</text>
    <text x="96" y="128" font-size="18" font-weight="500" fill="#666666">Main modules used to score transactions, create alerts, store records, and serve dashboard data</text>

    <g filter="url(#card-shadow)">
      <rect x="96" y="220" width="350" height="190" rx="24" fill="#ffffff" stroke="#dedede" />
      <rect x="96" y="220" width="350" height="58" rx="24" fill="#111111" />
      <path d="M96 254 H446 V278 H96 Z" fill="#111111" />
      <text x="271" y="258" text-anchor="middle" font-size="22" font-weight="850" fill="#ffffff">APIController</text>
      <text x="126" y="320" font-size="15" font-weight="700" fill="#222222">+ validate_request()</text>
      <text x="126" y="350" font-size="15" font-weight="700" fill="#222222">+ score_transaction()</text>
      <text x="126" y="380" font-size="15" font-weight="700" fill="#222222">+ update_alert_status()</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="724" y="220" width="350" height="190" rx="24" fill="#ffffff" stroke="#dedede" />
      <rect x="724" y="220" width="350" height="58" rx="24" fill="#111111" />
      <path d="M724 254 H1074 V278 H724 Z" fill="#111111" />
      <text x="899" y="258" text-anchor="middle" font-size="22" font-weight="850" fill="#ffffff">FraudScorer</text>
      <text x="754" y="320" font-size="15" font-weight="700" fill="#222222">+ score(features)</text>
      <text x="754" y="350" font-size="15" font-weight="700" fill="#222222">+ calculate_risk_level()</text>
      <text x="754" y="380" font-size="15" font-weight="700" fill="#222222">+ build_alert_reason()</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="1352" y="220" width="350" height="190" rx="24" fill="#ffffff" stroke="#dedede" />
      <rect x="1352" y="220" width="350" height="58" rx="24" fill="#111111" />
      <path d="M1352 254 H1702 V278 H1352 Z" fill="#111111" />
      <text x="1527" y="258" text-anchor="middle" font-size="22" font-weight="850" fill="#ffffff">ModelLoader</text>
      <text x="1382" y="320" font-size="15" font-weight="700" fill="#222222">+ load_model()</text>
      <text x="1382" y="350" font-size="15" font-weight="700" fill="#222222">+ model_name</text>
      <text x="1382" y="380" font-size="15" font-weight="700" fill="#222222">+ model_path</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="410" y="510" width="350" height="210" rx="24" fill="#ffffff" stroke="#dedede" />
      <rect x="410" y="510" width="350" height="58" rx="24" fill="#111111" />
      <path d="M410 544 H760 V568 H410 Z" fill="#111111" />
      <text x="585" y="548" text-anchor="middle" font-size="22" font-weight="850" fill="#ffffff">FeatureBuilder</text>
      <text x="440" y="610" font-size="15" font-weight="700" fill="#222222">+ clean_transaction()</text>
      <text x="440" y="640" font-size="15" font-weight="700" fill="#222222">+ build_history_features()</text>
      <text x="440" y="670" font-size="15" font-weight="700" fill="#222222">+ build_velocity_features()</text>
      <text x="440" y="700" font-size="15" font-weight="700" fill="#222222">+ prepare_model_frame()</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="1040" y="510" width="350" height="210" rx="24" fill="#ffffff" stroke="#dedede" />
      <rect x="1040" y="510" width="350" height="58" rx="24" fill="#111111" />
      <path d="M1040 544 H1390 V568 H1040 Z" fill="#111111" />
      <text x="1215" y="548" text-anchor="middle" font-size="22" font-weight="850" fill="#ffffff">DatabaseService</text>
      <text x="1070" y="610" font-size="15" font-weight="700" fill="#222222">+ save_transaction()</text>
      <text x="1070" y="640" font-size="15" font-weight="700" fill="#222222">+ save_alert()</text>
      <text x="1070" y="670" font-size="15" font-weight="700" fill="#222222">+ get_account_history()</text>
      <text x="1070" y="700" font-size="15" font-weight="700" fill="#222222">+ get_dashboard_metrics()</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="96" y="800" width="350" height="180" rx="24" fill="#ffffff" stroke="#dedede" />
      <rect x="96" y="800" width="350" height="58" rx="24" fill="#111111" />
      <path d="M96 834 H446 V858 H96 Z" fill="#111111" />
      <text x="271" y="838" text-anchor="middle" font-size="22" font-weight="850" fill="#ffffff">Transaction</text>
      <text x="126" y="900" font-size="15" font-weight="700" fill="#222222">account_id, amount</text>
      <text x="126" y="930" font-size="15" font-weight="700" fill="#222222">type, device, location</text>
      <text x="126" y="960" font-size="15" font-weight="700" fill="#222222">created_at, fraud_score</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="724" y="800" width="350" height="180" rx="24" fill="#ffffff" stroke="#dedede" />
      <rect x="724" y="800" width="350" height="58" rx="24" fill="#111111" />
      <path d="M724 834 H1074 V858 H724 Z" fill="#111111" />
      <text x="899" y="838" text-anchor="middle" font-size="22" font-weight="850" fill="#ffffff">Alert</text>
      <text x="754" y="900" font-size="15" font-weight="700" fill="#222222">transaction_id, risk_score</text>
      <text x="754" y="930" font-size="15" font-weight="700" fill="#222222">alert_type, reason</text>
      <text x="754" y="960" font-size="15" font-weight="700" fill="#222222">status, created_at</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="1352" y="800" width="350" height="180" rx="24" fill="#ffffff" stroke="#dedede" />
      <rect x="1352" y="800" width="350" height="58" rx="24" fill="#111111" />
      <path d="M1352 834 H1702 V858 H1352 Z" fill="#111111" />
      <text x="1527" y="838" text-anchor="middle" font-size="22" font-weight="850" fill="#ffffff">AccountProfile</text>
      <text x="1382" y="900" font-size="15" font-weight="700" fill="#222222">account_id, fraud_rate</text>
      <text x="1382" y="930" font-size="15" font-weight="700" fill="#222222">avg_amount, avg_risk</text>
      <text x="1382" y="960" font-size="15" font-weight="700" fill="#222222">open_alerts, history</text>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="1352" y="510" width="350" height="160" rx="24" fill="#ffffff" stroke="#dedede" />
      <rect x="1352" y="510" width="350" height="58" rx="24" fill="#111111" />
      <path d="M1352 544 H1702 V568 H1352 Z" fill="#111111" />
      <text x="1527" y="548" text-anchor="middle" font-size="22" font-weight="850" fill="#ffffff">DashboardService</text>
      <text x="1382" y="610" font-size="15" font-weight="700" fill="#222222">+ get_metrics()</text>
      <text x="1382" y="640" font-size="15" font-weight="700" fill="#222222">+ get_alert_distribution()</text>
    </g>

    <g fill="none" stroke="#111111" stroke-width="4.5" stroke-linecap="round" marker-end="url(#arrow)">
      <path d="M446 315 C540 315, 626 315, 724 315" />
      <path d="M1074 315 C1162 315, 1262 315, 1352 315" />
      <path d="M899 410 C820 462, 742 506, 760 580" />
      <path d="M899 410 C984 462, 1068 504, 1040 586" />
      <path d="M760 615 C852 615, 948 615, 1040 615" />
      <path d="M1215 720 C1120 764, 1018 790, 974 800" />
      <path d="M1215 720 C1322 746, 1426 770, 1498 800" />
      <path d="M410 640 C324 692, 276 748, 271 800" />
      <path d="M1390 590 C1416 590, 1326 590, 1352 590" />
    </g>

    <g font-size="14" font-weight="850" fill="#111111">
      <rect x="522" y="286" width="138" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="591" y="308" text-anchor="middle">scoring call</text>
      <rect x="1124" y="286" width="158" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="1203" y="308" text-anchor="middle">loads model</text>
      <rect x="794" y="586" width="202" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="895" y="608" text-anchor="middle">features and records</text>
    </g>
  </g>
</svg>
