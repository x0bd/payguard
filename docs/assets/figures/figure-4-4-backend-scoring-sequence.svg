<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">Figure 4.4: Backend scoring sequence diagram</title>
  <desc id="desc">Sequence diagram showing frontend scoring request, Flask validation, SQLite history retrieval, ML scoring, transaction and alert storage, and JSON response.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#111111"/></marker>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.4" fill="#d9ddd7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.12"/></filter>
    <style>
      .bg { fill: #f5f6f3; }
      .panel { fill: #ffffff; stroke: #e3e5e0; stroke-width: 2; filter: url(#shadow); }
      .actor { fill: #ffffff; stroke: #dfe3dc; stroke-width: 2; }
      .life { stroke: #cfd4cb; stroke-width: 2; stroke-dasharray: 8 10; }
      .msg { stroke: #111111; stroke-width: 3.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .return { stroke: #16a34a; stroke-width: 3.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-dasharray: 10 8; }
      .ink { fill: #111111; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #6f756c; font-family: Inter, Arial, sans-serif; }
      .mono { fill: #111111; font-family: "JetBrains Mono", "Courier New", monospace; }
      .green { fill: #16a34a; }
    </style>
  </defs>
  <rect class="bg" width="1800" height="1050"/><rect width="1800" height="1050" fill="url(#dots)" opacity="0.85"/>
  <text x="120" y="96" class="ink" font-size="34" font-weight="800">Backend Scoring Sequence</text>
  <text x="120" y="132" class="muted" font-size="18">How a transaction score is processed across frontend, API, database and model</text>
  <rect x="120" y="190" width="1560" height="760" rx="34" class="panel"/>

  <g>
    <rect x="190" y="245" width="210" height="74" rx="22" class="actor"/><text x="242" y="291" class="ink" font-size="18" font-weight="800">Frontend</text>
    <rect x="520" y="245" width="210" height="74" rx="22" class="actor"/><text x="573" y="291" class="ink" font-size="18" font-weight="800">Flask API</text>
    <rect x="850" y="245" width="210" height="74" rx="22" class="actor"/><text x="903" y="291" class="ink" font-size="18" font-weight="800">SQLite</text>
    <rect x="1180" y="245" width="210" height="74" rx="22" class="actor"/><text x="1241" y="291" class="ink" font-size="18" font-weight="800">ML Model</text>
  </g>
  <line x1="295" y1="319" x2="295" y2="875" class="life"/>
  <line x1="625" y1="319" x2="625" y2="875" class="life"/>
  <line x1="955" y1="319" x2="955" y2="875" class="life"/>
  <line x1="1285" y1="319" x2="1285" y2="875" class="life"/>

  <path d="M300 380 H620" class="msg"/><text x="355" y="365" class="mono" font-size="14">POST /api/score</text>
  <path d="M625 450 H950" class="msg"/><text x="682" y="435" class="mono" font-size="14">get account history</text>
  <path d="M950 505 H630" class="return"/><text x="690" y="490" class="mono" font-size="14">history rows</text>
  <path d="M630 575 H1280" class="msg"/><text x="790" y="560" class="mono" font-size="14">build features and predict</text>
  <path d="M1280 630 H630" class="return"/><text x="812" y="615" class="mono" font-size="14">label, probability, signals</text>
  <path d="M625 700 H950" class="msg"/><text x="685" y="685" class="mono" font-size="14">save transaction and alert</text>
  <path d="M950 755 H630" class="return"/><text x="730" y="740" class="mono" font-size="14">record ids</text>
  <path d="M625 825 H300" class="return"/><text x="380" y="810" class="mono" font-size="14">JSON risk response</text>

  <rect x="1360" y="685" width="225" height="72" rx="20" fill="#111111"/>
  <text x="1395" y="715" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Alert threshold</text>
  <text x="1395" y="740" fill="#86efac" font-family="JetBrains Mono, Courier New, monospace" font-size="14">risk_score >= 0.65</text>
</svg>
