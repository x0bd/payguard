<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Figure 4.4.2: Use case diagram</title>
  <desc id="desc">Use case diagram showing main user interactions with the PayGuard fraud monitoring system.</desc>
  <defs>
    <style>
      .title     { fill: #111111; font-family: Calibri, Arial, sans-serif; font-size: 40px; font-weight: 700; }
      .subtitle  { fill: #333333; font-family: Calibri, Arial, sans-serif; font-size: 22px; }
      .boundary  { fill: none; stroke: #111111; stroke-width: 2.5; }
      .usecase   { fill: #eaf7ee; stroke: #111111; stroke-width: 2; }
      .support   { fill: #eaf2ff; stroke: #111111; stroke-width: 2; }
      .actorFill { fill: #f2f2f2; stroke: #111111; stroke-width: 2; }
      .actorLine { stroke: #111111; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .assoc     { stroke: #111111; stroke-width: 2; fill: none; stroke-linecap: round; }
      .textLight { fill: #111111; font-family: Calibri, Arial, sans-serif; font-size: 19px; font-weight: 700; }
      .textDark  { fill: #111111; font-family: Calibri, Arial, sans-serif; font-size: 18px; font-weight: 600; }
    </style>
  </defs>

  <text x="90" y="72"  class="title">PayGuard Use Case Diagram</text>
  <text x="90" y="108" class="subtitle">Main user interactions supported by the fraud monitoring prototype</text>

  <!-- System boundary -->
  <rect x="380" y="152" width="850" height="672" rx="8" class="boundary"/>
  <text x="805" y="190" class="textDark" text-anchor="middle">PayGuard System</text>

  <!-- ── Use cases ─────────────────────────────────── -->
  <!-- Left column  cx=600 -->
  <ellipse cx="600" cy="268" rx="140" ry="44" class="usecase"/>
  <text x="600" y="262" class="textLight" text-anchor="middle">View</text>
  <text x="600" y="285" class="textLight" text-anchor="middle">Dashboard</text>

  <ellipse cx="600" cy="398" rx="140" ry="44" class="usecase"/>
  <text x="600" y="392" class="textLight" text-anchor="middle">Score</text>
  <text x="600" y="415" class="textLight" text-anchor="middle">Transaction</text>

  <ellipse cx="600" cy="528" rx="140" ry="44" class="usecase"/>
  <text x="600" y="522" class="textLight" text-anchor="middle">View</text>
  <text x="600" y="545" class="textLight" text-anchor="middle">Alerts</text>

  <ellipse cx="600" cy="658" rx="140" ry="44" class="usecase"/>
  <text x="600" y="652" class="textLight" text-anchor="middle">View Account</text>
  <text x="600" y="675" class="textLight" text-anchor="middle">Profile</text>

  <!-- Right column  cx=1010 -->
  <ellipse cx="1010" cy="268" rx="140" ry="44" class="usecase"/>
  <text x="1010" y="262" class="textLight" text-anchor="middle">View</text>
  <text x="1010" y="285" class="textLight" text-anchor="middle">Transactions</text>

  <ellipse cx="1010" cy="398" rx="140" ry="44" class="usecase"/>
  <text x="1010" y="392" class="textLight" text-anchor="middle">Update Alert</text>
  <text x="1010" y="415" class="textLight" text-anchor="middle">Status</text>

  <ellipse cx="1010" cy="528" rx="140" ry="44" class="usecase"/>
  <text x="1010" y="522" class="textLight" text-anchor="middle">View Model</text>
  <text x="1010" y="545" class="textLight" text-anchor="middle">Metrics</text>

  <ellipse cx="1010" cy="658" rx="140" ry="44" class="support"/>
  <text x="1010" y="652" class="textDark" text-anchor="middle">Generate Data</text>
  <text x="1010" y="675" class="textDark" text-anchor="middle">and Train Model</text>

  <!-- ── Actors ─────────────────────────────────────── -->

  <!-- Finance Officer  (top-left) -->
  <circle cx="175" cy="290" r="28" class="actorFill"/>
  <line x1="175" y1="318" x2="175" y2="385" class="actorLine"/>
  <line x1="133" y1="348" x2="217" y2="348" class="actorLine"/>
  <line x1="175" y1="385" x2="139" y2="441" class="actorLine"/>
  <line x1="175" y1="385" x2="211" y2="441" class="actorLine"/>
  <text x="175" y="468" class="textDark" text-anchor="middle">Finance Officer</text>

  <!-- Fraud Analyst  (bottom-left) -->
  <circle cx="175" cy="548" r="28" class="actorFill"/>
  <line x1="175" y1="576" x2="175" y2="643" class="actorLine"/>
  <line x1="133" y1="606" x2="217" y2="606" class="actorLine"/>
  <line x1="175" y1="643" x2="139" y2="699" class="actorLine"/>
  <line x1="175" y1="643" x2="211" y2="699" class="actorLine"/>
  <text x="175" y="726" class="textDark" text-anchor="middle">Fraud Analyst</text>

  <!-- Administrator  (top-right) -->
  <circle cx="1425" cy="290" r="28" class="actorFill"/>
  <line x1="1425" y1="318" x2="1425" y2="385" class="actorLine"/>
  <line x1="1383" y1="348" x2="1467" y2="348" class="actorLine"/>
  <line x1="1425" y1="385" x2="1389" y2="441" class="actorLine"/>
  <line x1="1425" y1="385" x2="1461" y2="441" class="actorLine"/>
  <text x="1425" y="468" class="textDark" text-anchor="middle">Administrator</text>

  <!-- Researcher / Developer  (bottom-right) -->
  <circle cx="1425" cy="548" r="28" class="actorFill"/>
  <line x1="1425" y1="576" x2="1425" y2="643" class="actorLine"/>
  <line x1="1383" y1="606" x2="1467" y2="606" class="actorLine"/>
  <line x1="1425" y1="643" x2="1389" y2="699" class="actorLine"/>
  <line x1="1425" y1="643" x2="1461" y2="699" class="actorLine"/>
  <text x="1425" y="726" class="textDark" text-anchor="middle">Researcher</text>
  <text x="1425" y="749" class="textDark" text-anchor="middle">or Developer</text>

  <!-- ── Association lines ──────────────────────────── -->

  <!-- Finance Officer → View Dashboard, Score Transaction, View Alerts -->
  <line x1="217" y1="348" x2="460" y2="268" class="assoc"/>
  <line x1="217" y1="348" x2="460" y2="398" class="assoc"/>
  <line x1="217" y1="348" x2="460" y2="528" class="assoc"/>

  <!-- Fraud Analyst → View Alerts, View Account Profile -->
  <line x1="217" y1="606" x2="460" y2="528" class="assoc"/>
  <line x1="217" y1="606" x2="460" y2="658" class="assoc"/>

  <!-- Administrator → View Transactions, Update Alert Status, View Model Metrics -->
  <line x1="1383" y1="348" x2="1150" y2="268" class="assoc"/>
  <line x1="1383" y1="348" x2="1150" y2="398" class="assoc"/>
  <line x1="1383" y1="348" x2="1150" y2="528" class="assoc"/>

  <!-- Researcher → View Model Metrics, Generate Data and Train Model -->
  <line x1="1383" y1="606" x2="1150" y2="528" class="assoc"/>
  <line x1="1383" y1="606" x2="1150" y2="658" class="assoc"/>

</svg>
