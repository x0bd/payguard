<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Figure 4.6: Alert lifecycle diagram</title>
  <desc id="desc">Alert lifecycle diagram showing scored transaction creation, open alert state, review action, and transition to resolved or closed.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#111111"/></marker>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.4" fill="#d9ddd7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.12"/></filter>
    <style>
      .bg { fill: #f5f6f3; }
      .panel { fill: #ffffff; stroke: #e3e5e0; stroke-width: 2; filter: url(#shadow); }
      .state { fill: #ffffff; stroke: #dfe3dc; stroke-width: 2; }
      .dark { fill: #111111; }
      .ink { fill: #111111; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #6f756c; font-family: Inter, Arial, sans-serif; }
      .mono { fill: #111111; font-family: "JetBrains Mono", "Courier New", monospace; }
      .line { stroke: #111111; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .green { fill: #16a34a; }
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/><rect width="1600" height="900" fill="url(#dots)" opacity="0.85"/>
  <text x="120" y="96" class="ink" font-size="34" font-weight="800">Alert Lifecycle</text>
  <text x="120" y="132" class="muted" font-size="18">States used when a suspicious transaction is created and reviewed</text>
  <rect x="120" y="185" width="1360" height="620" rx="34" class="panel"/>

  <circle cx="220" cy="485" r="18" class="dark"/>
  <rect x="315" y="410" width="255" height="150" rx="28" class="state"/>
  <text x="367" y="462" class="ink" font-size="22" font-weight="800">Scored Transaction</text>
  <text x="367" y="498" class="muted" font-size="15">Risk score returned</text>
  <text x="367" y="524" class="muted" font-size="15">Alert condition checked</text>

  <rect x="690" y="410" width="230" height="150" rx="28" class="state"/>
  <text x="765" y="462" class="ink" font-size="24" font-weight="800">Open</text>
  <text x="735" y="498" class="muted" font-size="15">Requires review</text>
  <circle cx="805" cy="526" r="10" class="green"/>

  <rect x="1050" y="305" width="230" height="140" rx="28" class="state"/>
  <text x="1110" y="357" class="ink" font-size="24" font-weight="800">Resolved</text>
  <text x="1090" y="393" class="muted" font-size="15">Reviewed and handled</text>

  <rect x="1050" y="535" width="230" height="140" rx="28" class="state"/>
  <text x="1122" y="587" class="ink" font-size="24" font-weight="800">Closed</text>
  <text x="1088" y="623" class="muted" font-size="15">Dismissed or ended</text>

  <circle cx="1385" cy="485" r="22" fill="none" stroke="#111111" stroke-width="5"/>
  <circle cx="1385" cy="485" r="12" class="dark"/>

  <path d="M240 485 H305" class="line"/>
  <path d="M570 485 H680" class="line"/>
  <path d="M920 485 C990 485 995 375 1040 375" class="line"/>
  <path d="M920 485 C990 485 995 605 1040 605" class="line"/>
  <path d="M1280 375 C1340 375 1330 455 1360 475" class="line"/>
  <path d="M1280 605 C1340 605 1330 515 1360 495" class="line"/>
  <text x="952" y="395" class="mono" font-size="14">resolve</text>
  <text x="955" y="622" class="mono" font-size="14">close</text>
</svg>
