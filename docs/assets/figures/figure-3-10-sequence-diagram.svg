<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3.10: Sequence diagram</title>
  <desc id="desc">Sequence diagram showing the transaction scoring interaction between dashboard, Flask API, feature builder, model, database, alert service, and dashboard response.</desc>
  <defs>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#d8d8d8" opacity="0.72" />
    </pattern>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111111" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
    <marker id="return-arrow" markerWidth="12" markerHeight="12" refX="2" refY="6" orient="auto">
      <path d="M10,2 L2,6 L10,10" fill="none" stroke="#666666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="1800" height="1050" fill="#f2f3f1" />
  <rect width="1800" height="1050" fill="url(#dot-grid)" opacity="0.95" />

  <g font-family="Inter, Arial, sans-serif">
    <text x="96" y="92" font-size="36" font-weight="850" fill="#101010">PayGuard Transaction Scoring Sequence</text>
    <text x="96" y="128" font-size="18" font-weight="500" fill="#666666">Runtime interaction when a user submits a transaction for fraud scoring</text>

    <g filter="url(#card-shadow)">
      <rect x="88" y="184" width="212" height="78" rx="22" fill="#ffffff" stroke="#dedede" />
      <text x="194" y="232" text-anchor="middle" font-size="19" font-weight="850" fill="#111111">Dashboard</text>
    </g>
    <g filter="url(#card-shadow)">
      <rect x="346" y="184" width="212" height="78" rx="22" fill="#ffffff" stroke="#dedede" />
      <text x="452" y="232" text-anchor="middle" font-size="19" font-weight="850" fill="#111111">Flask API</text>
    </g>
    <g filter="url(#card-shadow)">
      <rect x="604" y="184" width="212" height="78" rx="22" fill="#ffffff" stroke="#dedede" />
      <text x="710" y="232" text-anchor="middle" font-size="19" font-weight="850" fill="#111111">Database</text>
    </g>
    <g filter="url(#card-shadow)">
      <rect x="862" y="184" width="212" height="78" rx="22" fill="#ffffff" stroke="#dedede" />
      <text x="968" y="232" text-anchor="middle" font-size="19" font-weight="850" fill="#111111">FeatureBuilder</text>
    </g>
    <g filter="url(#card-shadow)">
      <rect x="1120" y="184" width="212" height="78" rx="22" fill="#ffffff" stroke="#dedede" />
      <text x="1226" y="232" text-anchor="middle" font-size="19" font-weight="850" fill="#111111">ML Model</text>
    </g>
    <g filter="url(#card-shadow)">
      <rect x="1378" y="184" width="236" height="78" rx="22" fill="#ffffff" stroke="#dedede" />
      <text x="1496" y="232" text-anchor="middle" font-size="19" font-weight="850" fill="#111111">Alert Service</text>
    </g>

    <g stroke="#c9c9c9" stroke-width="2" stroke-dasharray="8 9">
      <line x1="194" y1="262" x2="194" y2="920" />
      <line x1="452" y1="262" x2="452" y2="920" />
      <line x1="710" y1="262" x2="710" y2="920" />
      <line x1="968" y1="262" x2="968" y2="920" />
      <line x1="1226" y1="262" x2="1226" y2="920" />
      <line x1="1496" y1="262" x2="1496" y2="920" />
    </g>

    <g fill="#16a34a" opacity="0.98">
      <rect x="444" y="328" width="16" height="478" rx="8" />
      <rect x="960" y="456" width="16" height="108" rx="8" />
      <rect x="1218" y="584" width="16" height="84" rx="8" />
      <rect x="702" y="376" width="16" height="380" rx="8" />
      <rect x="1488" y="694" width="16" height="82" rx="8" />
    </g>

    <g fill="none" stroke="#111111" stroke-width="4.5" stroke-linecap="round" marker-end="url(#arrow)">
      <path d="M194 330 H452" />
      <path d="M452 378 H710" />
      <path d="M452 456 H968" />
      <path d="M968 584 H1226" />
      <path d="M452 694 H1496" />
      <path d="M452 758 H710" />
      <path d="M452 806 H194" />
    </g>

    <g fill="none" stroke="#666666" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="8 8" marker-start="url(#return-arrow)">
      <path d="M710 424 H452" />
      <path d="M1226 650 H968" />
      <path d="M1496 758 H452" />
    </g>

    <g font-size="15" font-weight="850" fill="#111111">
      <rect x="214" y="302" width="214" height="36" rx="18" fill="#ffffff" stroke="#e9e9e9" />
      <text x="321" y="326" text-anchor="middle">1. Submit /api/score</text>

      <rect x="492" y="350" width="176" height="36" rx="18" fill="#ffffff" stroke="#e9e9e9" />
      <text x="580" y="374" text-anchor="middle">2. Get history</text>

      <rect x="512" y="428" width="354" height="36" rx="18" fill="#ffffff" stroke="#e9e9e9" />
      <text x="689" y="452" text-anchor="middle">3. Build transaction feature frame</text>

      <rect x="1016" y="556" width="176" height="36" rx="18" fill="#ffffff" stroke="#e9e9e9" />
      <text x="1104" y="580" text-anchor="middle">4. Predict risk</text>

      <rect x="536" y="666" width="318" height="36" rx="18" fill="#ffffff" stroke="#e9e9e9" />
      <text x="695" y="690" text-anchor="middle">5. Create alert if threshold met</text>

      <rect x="522" y="730" width="178" height="36" rx="18" fill="#ffffff" stroke="#e9e9e9" />
      <text x="611" y="754" text-anchor="middle">6. Save records</text>

      <rect x="218" y="778" width="206" height="36" rx="18" fill="#ffffff" stroke="#e9e9e9" />
      <text x="321" y="802" text-anchor="middle">7. Return risk result</text>
    </g>

    <g font-size="14" font-weight="800" fill="#666666">
      <rect x="512" y="398" width="150" height="30" rx="15" fill="#ffffff" stroke="#eeeeee" />
      <text x="587" y="419" text-anchor="middle">history rows</text>

      <rect x="1014" y="626" width="176" height="30" rx="15" fill="#ffffff" stroke="#eeeeee" />
      <text x="1102" y="647" text-anchor="middle">probability score</text>

      <rect x="1280" y="730" width="142" height="30" rx="15" fill="#ffffff" stroke="#eeeeee" />
      <text x="1351" y="751" text-anchor="middle">alert object</text>
    </g>
  </g>
</svg>
