<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1000" viewBox="0 0 1700 1000" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3.15: Alerts page wireframe</title>
  <desc id="desc">A clean PayGuard alerts page wireframe showing filters, alert queue, selected alert details and review actions.</desc>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.4" fill="#d9ddd7"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f5f6f3; }
      .panel { fill: #ffffff; stroke: #e3e5e0; stroke-width: 2; filter: url(#shadow); }
      .soft { fill: #f7f8f5; stroke: #e4e6e1; stroke-width: 2; }
      .card { fill: #ffffff; stroke: #e5e7e1; stroke-width: 2; }
      .ink { fill: #111111; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #6f756c; font-family: Inter, Arial, sans-serif; }
      .mono { fill: #111111; font-family: "JetBrains Mono", "Courier New", monospace; }
      .green { fill: #16a34a; }
      .green-stroke { stroke: #16a34a; }
      .thin { stroke: #d9ded6; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1700" height="1000"/>
  <rect width="1700" height="1000" fill="url(#dots)" opacity="0.85"/>

  <text x="120" y="96" class="ink" font-size="34" font-weight="800">PayGuard Alerts Page Wireframe</text>
  <text x="120" y="132" class="muted" font-size="18">Review workspace for investigating high-risk transactions and updating alert status</text>

  <rect x="120" y="180" width="1460" height="720" rx="34" class="panel"/>

  <rect x="160" y="225" width="1340" height="82" rx="24" fill="#111111"/>
  <text x="200" y="276" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Alerts</text>
  <text x="305" y="276" fill="#b9beb6" font-family="Inter, Arial, sans-serif" font-size="15">Open fraud cases from the scoring engine</text>
  <rect x="1250" y="241" width="210" height="50" rx="16" fill="#ffffff"/>
  <text x="1285" y="272" class="ink" font-size="15" font-weight="800">Export review log</text>
  <circle cx="1431" cy="266" r="8" class="green"/>

  <rect x="160" y="335" width="1340" height="76" rx="22" class="soft"/>
  <rect x="195" y="354" width="310" height="38" rx="13" fill="#ffffff" stroke="#e5e7e1"/>
  <text x="218" y="379" class="muted" font-size="14">Search transaction or account</text>
  <rect x="535" y="354" width="160" height="38" rx="13" fill="#ffffff" stroke="#e5e7e1"/>
  <text x="560" y="379" class="ink" font-size="14" font-weight="700">Status: open</text>
  <rect x="715" y="354" width="170" height="38" rx="13" fill="#ffffff" stroke="#e5e7e1"/>
  <text x="740" y="379" class="ink" font-size="14" font-weight="700">Risk: high</text>
  <rect x="905" y="354" width="190" height="38" rx="13" fill="#ffffff" stroke="#e5e7e1"/>
  <text x="930" y="379" class="ink" font-size="14" font-weight="700">Date: latest</text>
  <rect x="1318" y="354" width="145" height="38" rx="13" fill="#111111"/>
  <text x="1353" y="379" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Apply</text>

  <rect x="160" y="445" width="800" height="385" rx="28" class="soft"/>
  <text x="195" y="493" class="ink" font-size="20" font-weight="800">Alert queue</text>
  <text x="195" y="519" class="muted" font-size="14">Prioritised by fraud probability and review status</text>

  <g>
    <rect x="195" y="550" width="730" height="64" rx="18" class="card"/>
    <circle cx="225" cy="582" r="9" class="green"/>
    <text x="250" y="575" class="ink" font-size="15" font-weight="800">AL-10041</text>
    <text x="250" y="597" class="muted" font-size="13">TX-09218 - large transfer to new receiver</text>
    <text x="690" y="575" class="mono" font-size="14">risk 0.94</text>
    <rect x="805" y="563" width="88" height="34" rx="12" fill="#111111"/>
    <text x="828" y="585" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">Open</text>
  </g>
  <g>
    <rect x="195" y="630" width="730" height="64" rx="18" class="card"/>
    <circle cx="225" cy="662" r="9" fill="#111111"/>
    <text x="250" y="655" class="ink" font-size="15" font-weight="800">AL-10040</text>
    <text x="250" y="677" class="muted" font-size="13">TX-09177 - repeated transfers in short period</text>
    <text x="690" y="655" class="mono" font-size="14">risk 0.88</text>
    <rect x="805" y="643" width="88" height="34" rx="12" fill="#f7f8f5" stroke="#d9ded6"/>
    <text x="826" y="665" class="ink" font-size="12" font-weight="800">Review</text>
  </g>
  <g>
    <rect x="195" y="710" width="730" height="64" rx="18" class="card"/>
    <circle cx="225" cy="742" r="9" fill="#9ca3af"/>
    <text x="250" y="735" class="ink" font-size="15" font-weight="800">AL-10039</text>
    <text x="250" y="757" class="muted" font-size="13">TX-09102 - unusual account behaviour detected</text>
    <text x="690" y="735" class="mono" font-size="14">risk 0.82</text>
    <rect x="805" y="723" width="88" height="34" rx="12" fill="#f7f8f5" stroke="#d9ded6"/>
    <text x="823" y="745" class="ink" font-size="12" font-weight="800">Queued</text>
  </g>

  <rect x="1000" y="445" width="500" height="385" rx="28" class="soft"/>
  <text x="1035" y="493" class="ink" font-size="20" font-weight="800">Selected alert detail</text>
  <text x="1035" y="519" class="muted" font-size="14">Information shown before a reviewer changes status</text>

  <rect x="1035" y="550" width="430" height="108" rx="20" class="card"/>
  <text x="1065" y="585" class="muted" font-size="13">Transaction</text>
  <text x="1065" y="615" class="mono" font-size="22" font-weight="800">TX-09218</text>
  <text x="1280" y="585" class="muted" font-size="13">Risk score</text>
  <text x="1280" y="615" class="mono" font-size="22" font-weight="800">0.94</text>
  <line x1="1065" y1="635" x2="1435" y2="635" class="thin"/>

  <rect x="1035" y="680" width="430" height="82" rx="20" class="card"/>
  <text x="1065" y="712" class="ink" font-size="15" font-weight="800">Reason flags</text>
  <text x="1065" y="738" class="muted" font-size="13">High amount, new receiver, abnormal account pattern</text>

  <rect x="1035" y="782" width="130" height="44" rx="15" fill="#111111"/>
  <text x="1074" y="810" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Resolve</text>
  <rect x="1182" y="782" width="130" height="44" rx="15" fill="#ffffff" stroke="#d9ded6"/>
  <text x="1216" y="810" class="ink" font-size="13" font-weight="800">Escalate</text>
  <rect x="1329" y="782" width="136" height="44" rx="15" fill="#ffffff" stroke="#d9ded6"/>
  <text x="1360" y="810" class="ink" font-size="13" font-weight="800">Dismiss</text>

  <text x="160" y="872" class="muted" font-size="13">Wireframe elements: filter bar, alert queue, selected alert details, reason flags and reviewer actions.</text>
</svg>
