<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1000" viewBox="0 0 1700 1000" role="img" aria-labelledby="title desc">
  <title id="title">Figure 4.3: Machine learning pipeline diagram</title>
  <desc id="desc">Machine learning pipeline from synthetic data loading through feature engineering, train-test split, model comparison, evaluation and saved model output.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#111111"/></marker>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.4" fill="#d9ddd7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.12"/></filter>
    <style>
      .bg { fill: #f5f6f3; }
      .panel { fill: #ffffff; stroke: #e3e5e0; stroke-width: 2; filter: url(#shadow); }
      .card { fill: #ffffff; stroke: #dfe3dc; stroke-width: 2; }
      .soft { fill: #f7f8f5; stroke: #e4e6e1; stroke-width: 2; }
      .ink { fill: #111111; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #6f756c; font-family: Inter, Arial, sans-serif; }
      .mono { fill: #111111; font-family: "JetBrains Mono", "Courier New", monospace; }
      .green { fill: #16a34a; }
      .line { stroke: #111111; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" width="1700" height="1000"/><rect width="1700" height="1000" fill="url(#dots)" opacity="0.85"/>
  <text x="120" y="96" class="ink" font-size="34" font-weight="800">Machine Learning Pipeline</text>
  <text x="120" y="132" class="muted" font-size="18">Training and saving the selected fraud detection model</text>
  <rect x="120" y="190" width="1460" height="690" rx="34" class="panel"/>

  <rect x="190" y="410" width="205" height="135" rx="24" class="card"/>
  <text x="225" y="458" class="ink" font-size="20" font-weight="800">Load Dataset</text>
  <text x="225" y="492" class="muted" font-size="14">CSV transaction</text>
  <text x="225" y="517" class="muted" font-size="14">records and labels</text>

  <rect x="465" y="410" width="220" height="135" rx="24" class="card"/>
  <text x="500" y="458" class="ink" font-size="20" font-weight="800">Clean and Build</text>
  <text x="500" y="492" class="muted" font-size="14">Numeric features</text>
  <text x="500" y="517" class="muted" font-size="14">Categorical features</text>

  <rect x="755" y="410" width="210" height="135" rx="24" class="card"/>
  <text x="790" y="458" class="ink" font-size="20" font-weight="800">Split Data</text>
  <text x="790" y="492" class="muted" font-size="14">Training set</text>
  <text x="790" y="517" class="muted" font-size="14">Testing set</text>

  <rect x="1035" y="315" width="245" height="135" rx="24" class="soft"/>
  <text x="1070" y="363" class="ink" font-size="20" font-weight="800">Logistic Regression</text>
  <text x="1070" y="397" class="muted" font-size="14">Baseline comparison</text>

  <rect x="1035" y="505" width="245" height="135" rx="24" class="soft"/>
  <text x="1070" y="553" class="ink" font-size="20" font-weight="800">Random Forest</text>
  <text x="1070" y="587" class="muted" font-size="14">Selected model</text>
  <circle cx="1240" cy="572" r="9" class="green"/>

  <rect x="1350" y="410" width="205" height="135" rx="24" class="card"/>
  <text x="1385" y="458" class="ink" font-size="20" font-weight="800">Evaluate and Save</text>
  <text x="1385" y="492" class="muted" font-size="14">Precision, recall</text>
  <text x="1385" y="517" class="muted" font-size="14">F1 and ROC-AUC</text>

  <path d="M395 477 H455" class="line"/><path d="M685 477 H745" class="line"/><path d="M965 477 C1000 477 1000 383 1025 383" class="line"/><path d="M965 477 C1000 477 1000 573 1025 573" class="line"/><path d="M1280 383 C1325 383 1325 477 1340 477" class="line"/><path d="M1280 573 C1325 573 1325 477 1340 477" class="line"/>

  <rect x="640" y="700" width="430" height="58" rx="18" fill="#111111"/>
  <text x="685" y="736" fill="#ffffff" font-family="JetBrains Mono, Courier New, monospace" font-size="16">models/fraud_model.joblib</text>
</svg>
