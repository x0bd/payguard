<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Figure 3.9: Object diagram</title>
  <desc id="desc">Object diagram showing example PayGuard runtime objects for a scored transaction and its related alert, account profile, scorer, and model.</desc>
  <defs>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#d8d8d8" opacity="0.72" />
    </pattern>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111111" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#f2f3f1" />
  <rect width="1600" height="900" fill="url(#dot-grid)" opacity="0.95" />

  <g font-family="Inter, Arial, sans-serif">
    <text x="96" y="92" font-size="34" font-weight="850" fill="#101010">PayGuard Object Diagram</text>
    <text x="96" y="126" font-size="18" font-weight="500" fill="#666666">Example runtime objects for one scored transaction</text>

    <g filter="url(#card-shadow)">
      <rect x="108" y="238" width="380" height="250" rx="26" fill="#ffffff" stroke="#dedede" />
      <rect x="108" y="238" width="380" height="58" rx="26" fill="#111111" />
      <path d="M108 272 H488 V296 H108 Z" fill="#111111" />
      <text x="298" y="276" text-anchor="middle" font-size="21" font-weight="850" fill="#ffffff">tx_1048 : Transaction</text>
      <g font-size="15" font-weight="700" fill="#222222">
        <text x="138" y="338">account_id = ACC-019</text>
        <text x="138" y="370">transaction_type = cash_out</text>
        <text x="138" y="402">amount = 950.00</text>
        <text x="138" y="434">location = Harare</text>
        <text x="138" y="466">fraud_score = 0.86</text>
      </g>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="606" y="238" width="380" height="250" rx="26" fill="#ffffff" stroke="#dedede" />
      <rect x="606" y="238" width="380" height="58" rx="26" fill="#111111" />
      <path d="M606 272 H986 V296 H606 Z" fill="#111111" />
      <text x="796" y="276" text-anchor="middle" font-size="21" font-weight="850" fill="#ffffff">alert_221 : Alert</text>
      <g font-size="15" font-weight="700" fill="#222222">
        <text x="636" y="338">transaction_id = tx_1048</text>
        <text x="636" y="370">risk_score = 0.86</text>
        <text x="636" y="402">alert_type = high_risk</text>
        <text x="636" y="434">status = open</text>
        <text x="636" y="466">reason = amount spike</text>
      </g>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="1104" y="238" width="380" height="250" rx="26" fill="#ffffff" stroke="#dedede" />
      <rect x="1104" y="238" width="380" height="58" rx="26" fill="#111111" />
      <path d="M1104 272 H1484 V296 H1104 Z" fill="#111111" />
      <text x="1294" y="276" text-anchor="middle" font-size="21" font-weight="850" fill="#ffffff">profile_019 : AccountProfile</text>
      <g font-size="15" font-weight="700" fill="#222222">
        <text x="1134" y="338">account_id = ACC-019</text>
        <text x="1134" y="370">prior_avg_amount = 84.20</text>
        <text x="1134" y="402">total_transactions = 117</text>
        <text x="1134" y="434">fraud_rate = 3.4%</text>
        <text x="1134" y="466">open_alerts = 2</text>
      </g>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="346" y="602" width="380" height="204" rx="26" fill="#ffffff" stroke="#dedede" />
      <rect x="346" y="602" width="380" height="58" rx="26" fill="#111111" />
      <path d="M346 636 H726 V660 H346 Z" fill="#111111" />
      <text x="536" y="640" text-anchor="middle" font-size="21" font-weight="850" fill="#ffffff">scorer : FraudScorer</text>
      <g font-size="15" font-weight="700" fill="#222222">
        <text x="376" y="702">model_name = random_forest</text>
        <text x="376" y="734">threshold = 0.65</text>
        <text x="376" y="766">risk_level = high</text>
      </g>
    </g>

    <g filter="url(#card-shadow)">
      <rect x="874" y="602" width="380" height="204" rx="26" fill="#ffffff" stroke="#dedede" />
      <rect x="874" y="602" width="380" height="58" rx="26" fill="#111111" />
      <path d="M874 636 H1254 V660 H874 Z" fill="#111111" />
      <text x="1064" y="640" text-anchor="middle" font-size="21" font-weight="850" fill="#ffffff">model : SavedModel</text>
      <g font-size="15" font-weight="700" fill="#222222">
        <text x="904" y="702">file = fraud_model.joblib</text>
        <text x="904" y="734">algorithm = random_forest</text>
        <text x="904" y="766">output = fraud probability</text>
      </g>
    </g>

    <g fill="none" stroke="#111111" stroke-width="4.5" stroke-linecap="round" marker-end="url(#arrow)">
      <path d="M488 363 C528 363, 566 363, 606 363" />
      <path d="M986 363 C1026 363, 1064 363, 1104 363" />
      <path d="M536 602 C500 554, 426 506, 376 488" />
      <path d="M726 704 C776 704, 824 704, 874 704" />
      <path d="M1064 602 C1050 552, 1002 502, 954 472" />
      <path d="M1294 488 C1238 554, 1192 584, 1160 602" />
    </g>

    <g font-size="14" font-weight="850" fill="#111111">
      <rect x="500" y="330" width="96" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="548" y="352" text-anchor="middle">creates</text>

      <rect x="1000" y="330" width="92" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="1046" y="352" text-anchor="middle">belongs to</text>

      <rect x="424" y="536" width="128" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="488" y="558" text-anchor="middle">scores</text>

      <rect x="764" y="670" width="104" height="34" rx="17" fill="#ffffff" stroke="#e9e9e9" />
      <text x="816" y="692" text-anchor="middle">uses</text>
    </g>
  </g>
</svg>
