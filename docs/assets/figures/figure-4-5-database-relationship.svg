<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1000" viewBox="0 0 1700 1000" role="img" aria-labelledby="title desc">
  <title id="title">Figure 4.5: Database relationship diagram</title>
  <desc id="desc">Database relationship diagram showing transactions, alerts and model_runs tables, with alerts linked to transactions by transaction_id.</desc>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.4" fill="#d9ddd7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.12"/></filter>
    <style>
      .bg { fill: #f5f6f3; }
      .panel { fill: #ffffff; stroke: #e3e5e0; stroke-width: 2; filter: url(#shadow); }
      .table { fill: #ffffff; stroke: #dfe3dc; stroke-width: 2; }
      .head { fill: #111111; }
      .ink { fill: #111111; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #6f756c; font-family: Inter, Arial, sans-serif; }
      .mono { fill: #111111; font-family: "JetBrains Mono", "Courier New", monospace; }
      .line { stroke: #111111; stroke-width: 4; fill: none; stroke-linecap: round; }
      .green { fill: #16a34a; }
    </style>
  </defs>
  <rect class="bg" width="1700" height="1000"/><rect width="1700" height="1000" fill="url(#dots)" opacity="0.85"/>
  <text x="120" y="96" class="ink" font-size="34" font-weight="800">Database Relationship Diagram</text>
  <text x="120" y="132" class="muted" font-size="18">SQLite schema used by the PayGuard prototype</text>
  <rect x="120" y="190" width="1460" height="690" rx="34" class="panel"/>

  <g>
    <rect x="210" y="290" width="390" height="410" rx="28" class="table"/>
    <path d="M210 318 Q210 290 238 290 H572 Q600 290 600 318 V365 H210 Z" class="head"/>
    <text x="250" y="341" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">transactions</text>
    <text x="250" y="406" class="mono" font-size="15">PK id</text>
    <text x="250" y="438" class="mono" font-size="15">account_id</text>
    <text x="250" y="470" class="mono" font-size="15">transaction_type</text>
    <text x="250" y="502" class="mono" font-size="15">amount, currency</text>
    <text x="250" y="534" class="mono" font-size="15">device_id, location</text>
    <text x="250" y="566" class="mono" font-size="15">created_at</text>
    <text x="250" y="598" class="mono" font-size="15">is_fraud</text>
    <text x="250" y="630" class="mono" font-size="15">fraud_score</text>
    <text x="250" y="662" class="mono" font-size="15">metadata_json</text>
  </g>

  <g>
    <rect x="1110" y="330" width="390" height="330" rx="28" class="table"/>
    <path d="M1110 358 Q1110 330 1138 330 H1472 Q1500 330 1500 358 V405 H1110 Z" class="head"/>
    <text x="1150" y="381" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">alerts</text>
    <text x="1150" y="446" class="mono" font-size="15">PK id</text>
    <text x="1150" y="478" class="mono" font-size="15">FK transaction_id</text>
    <text x="1150" y="510" class="mono" font-size="15">risk_score</text>
    <text x="1150" y="542" class="mono" font-size="15">alert_type</text>
    <text x="1150" y="574" class="mono" font-size="15">reason, status</text>
    <text x="1150" y="606" class="mono" font-size="15">created_at, resolved_at</text>
  </g>

  <g>
    <rect x="660" y="705" width="370" height="125" rx="28" class="table"/>
    <path d="M660 733 Q660 705 688 705 H1002 Q1030 705 1030 733 V770 H660 Z" class="head"/>
    <text x="700" y="756" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">model_runs</text>
    <text x="700" y="805" class="mono" font-size="15">model_name, version, metrics_json</text>
  </g>

  <path d="M600 495 H1110" class="line"/>
  <circle cx="635" cy="495" r="10" class="green"/>
  <text x="790" y="478" class="mono" font-size="15">one transaction</text>
  <text x="790" y="530" class="mono" font-size="15">zero or more alerts</text>
</svg>
