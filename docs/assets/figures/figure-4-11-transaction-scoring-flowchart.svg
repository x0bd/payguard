<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1100" viewBox="0 0 1700 1100" role="img" aria-labelledby="title desc">
  <title id="title">Figure 4.11: Transaction scoring flowchart</title>
  <desc id="desc">Implementation-focused flowchart for transaction scoring from dashboard submission to validation, account history, feature engineering, prediction, alert storage and response.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#111111"/></marker>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.4" fill="#d9ddd7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.12"/></filter>
    <style>
      .bg { fill: #f5f6f3; }
      .panel { fill: #ffffff; stroke: #e3e5e0; stroke-width: 2; filter: url(#shadow); }
      .step { fill: #ffffff; stroke: #dfe3dc; stroke-width: 2; }
      .decision { fill: #f7f8f5; stroke: #111111; stroke-width: 2; }
      .ink { fill: #111111; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #6f756c; font-family: Inter, Arial, sans-serif; }
      .mono { fill: #111111; font-family: "JetBrains Mono", "Courier New", monospace; }
      .line { stroke: #111111; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .green { fill: #16a34a; }
    </style>
  </defs>
  <rect class="bg" width="1700" height="1100"/><rect width="1700" height="1100" fill="url(#dots)" opacity="0.85"/>
  <text x="120" y="96" class="ink" font-size="34" font-weight="800">Transaction Scoring Flowchart</text>
  <text x="120" y="132" class="muted" font-size="18">Implementation flow used when the PayGuard dashboard submits a transaction for scoring</text>
  <rect x="120" y="185" width="1460" height="830" rx="34" class="panel"/>

  <rect x="690" y="235" width="320" height="70" rx="35" fill="#111111"/>
  <text x="770" y="278" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Start scoring request</text>
  <rect x="690" y="350" width="320" height="80" rx="24" class="step"/>
  <text x="740" y="383" class="ink" font-size="18" font-weight="800">Receive JSON input</text>
  <text x="740" y="410" class="muted" font-size="14">Frontend calls /api/score</text>

  <polygon points="850,475 1010,555 850,635 690,555" class="decision"/>
  <text x="780" y="550" class="ink" font-size="17" font-weight="800">Input valid?</text>
  <text x="790" y="575" class="muted" font-size="13">fields, amount, time</text>

  <rect x="1115" y="515" width="260" height="80" rx="24" class="step"/>
  <text x="1165" y="548" class="ink" font-size="18" font-weight="800">Return error</text>
  <text x="1165" y="575" class="muted" font-size="14">Clear JSON message</text>

  <rect x="690" y="685" width="320" height="80" rx="24" class="step"/>
  <text x="735" y="718" class="ink" font-size="18" font-weight="800">Retrieve account history</text>
  <text x="735" y="745" class="muted" font-size="14">Previous SQLite records</text>
  <rect x="690" y="805" width="320" height="80" rx="24" class="step"/>
  <text x="735" y="838" class="ink" font-size="18" font-weight="800">Build model features</text>
  <text x="735" y="865" class="muted" font-size="14">Amount, velocity, device, location</text>

  <rect x="300" y="805" width="270" height="80" rx="24" class="step"/>
  <text x="348" y="838" class="ink" font-size="18" font-weight="800">Predict risk</text>
  <text x="348" y="865" class="muted" font-size="14">Loaded joblib model</text>
  <rect x="300" y="685" width="270" height="80" rx="24" class="step"/>
  <text x="348" y="718" class="ink" font-size="18" font-weight="800">Save transaction</text>
  <text x="348" y="745" class="muted" font-size="14">Store score and label</text>

  <polygon points="435,475 585,555 435,635 285,555" class="decision"/>
  <text x="365" y="550" class="ink" font-size="17" font-weight="800">Alert needed?</text>
  <text x="355" y="575" class="muted" font-size="13">fraud or score >= 0.65</text>

  <rect x="285" y="350" width="300" height="80" rx="24" class="step"/>
  <text x="335" y="383" class="ink" font-size="18" font-weight="800">Create alert record</text>
  <text x="335" y="410" class="muted" font-size="14">Reason and risk level</text>
  <rect x="690" y="925" width="320" height="58" rx="29" fill="#111111"/>
  <text x="752" y="961" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Return dashboard result</text>

  <path d="M850 305 V340" class="line"/><path d="M850 430 V465" class="line"/>
  <path d="M1010 555 H1105" class="line"/><text x="1032" y="540" class="mono" font-size="13">no</text>
  <path d="M850 635 V675" class="line"/><text x="865" y="660" class="mono" font-size="13">yes</text>
  <path d="M850 765 V795" class="line"/><path d="M690 845 H580" class="line"/>
  <path d="M435 805 V775" class="line"/><path d="M435 685 V645" class="line"/>
  <path d="M435 475 V440" class="line"/><text x="450" y="458" class="mono" font-size="13">yes</text>
  <path d="M585 555 C650 555 650 925 800 925" class="line"/><text x="608" y="540" class="mono" font-size="13">no</text>
  <path d="M585 390 C720 390 730 925 830 925" class="line"/>
  <circle cx="850" cy="955" r="9" class="green"/>
</svg>
