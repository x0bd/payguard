<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1000" viewBox="0 0 1700 1000" role="img" aria-labelledby="title desc">
  <title id="title">Figure 4.12: Deployment diagram</title>
  <desc id="desc">Deployment diagram showing local development with Vite frontend, Flask backend, SQLite database, saved model and synthetic data assets.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#111111"/></marker>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="1.4" fill="#d9ddd7"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.12"/></filter>
    <style>
      .bg { fill: #f5f6f3; }
      .panel { fill: #ffffff; stroke: #e3e5e0; stroke-width: 2; filter: url(#shadow); }
      .node { fill: #ffffff; stroke: #dfe3dc; stroke-width: 2; }
      .dark { fill: #111111; }
      .soft { fill: #f7f8f5; stroke: #e4e6e1; stroke-width: 2; }
      .ink { fill: #111111; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #6f756c; font-family: Inter, Arial, sans-serif; }
      .mono { fill: #111111; font-family: "JetBrains Mono", "Courier New", monospace; }
      .line { stroke: #111111; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .green { fill: #16a34a; }
    </style>
  </defs>
  <rect class="bg" width="1700" height="1000"/><rect width="1700" height="1000" fill="url(#dots)" opacity="0.85"/>
  <text x="120" y="96" class="ink" font-size="34" font-weight="800">Development Deployment Diagram</text>
  <text x="120" y="132" class="muted" font-size="18">Local arrangement used to run and demonstrate the PayGuard prototype</text>
  <rect x="120" y="190" width="1460" height="690" rx="34" class="panel"/>

  <rect x="210" y="300" width="330" height="250" rx="30" class="node"/>
  <text x="255" y="355" class="ink" font-size="24" font-weight="800">User Browser</text>
  <text x="255" y="394" class="muted" font-size="16">React dashboard</text>
  <rect x="255" y="425" width="185" height="42" rx="14" fill="#111111"/>
  <text x="282" y="452" fill="#ffffff" font-family="JetBrains Mono, Courier New, monospace" font-size="14">localhost:5173</text>

  <rect x="690" y="300" width="330" height="250" rx="30" class="node"/>
  <text x="735" y="355" class="ink" font-size="24" font-weight="800">Flask Backend</text>
  <text x="735" y="394" class="muted" font-size="16">API routes and scoring logic</text>
  <rect x="735" y="425" width="185" height="42" rx="14" fill="#111111"/>
  <text x="762" y="452" fill="#ffffff" font-family="JetBrains Mono, Courier New, monospace" font-size="14">localhost:5000</text>

  <rect x="1165" y="270" width="280" height="150" rx="28" class="soft"/>
  <text x="1205" y="322" class="ink" font-size="22" font-weight="800">SQLite Database</text>
  <text x="1205" y="358" class="mono" font-size="14">data/payguard.db</text>
  <rect x="1165" y="470" width="280" height="150" rx="28" class="soft"/>
  <text x="1205" y="522" class="ink" font-size="22" font-weight="800">Saved Model</text>
  <text x="1205" y="558" class="mono" font-size="14">models/*.joblib</text>
  <rect x="690" y="665" width="330" height="105" rx="26" class="soft"/>
  <text x="735" y="713" class="ink" font-size="22" font-weight="800">Synthetic Dataset</text>
  <text x="735" y="748" class="mono" font-size="14">data/*.csv</text>

  <path d="M540 425 H680" class="line"/>
  <text x="572" y="405" class="mono" font-size="14">/api proxy</text>
  <path d="M1020 390 C1080 390 1080 345 1155 345" class="line"/>
  <path d="M1020 460 C1080 460 1080 545 1155 545" class="line"/>
  <path d="M855 665 V560" class="line"/>
  <circle cx="855" cy="425" r="10" class="green"/>
  <text x="210" y="805" class="muted" font-size="14">Production note: frontend can be hosted as a static build, while Flask and database storage need managed deployment controls.</text>
</svg>
